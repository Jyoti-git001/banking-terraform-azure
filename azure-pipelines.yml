# Azure pipeline to run terraform automatically
# when I push to main it will plan and apply my infrastructure

trigger:
  branches:
    include:
      - main

stages:

# Stage 1 - Plan what terraform will do (runs on every PR)
- stage: TerraformPlan
  jobs:
  - job: Plan
    pool:
      vmImage: 'ubuntu-latest'
    steps:

    - script: |
        cd terraform
        terraform init
        terraform validate
        terraform plan -var-file="../environments/dev.tfvars"
      displayName: 'Terraform Plan'
      env:
        ARM_CLIENT_ID: $(ARM_CLIENT_ID)
        ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
        ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
        ARM_TENANT_ID: $(ARM_TENANT_ID)

# Stage 2 - Actually create the infrastructure (only on merge to main)
- stage: TerraformApply
  dependsOn: TerraformPlan
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: Apply
    environment: 'dev'   # needs approval before running
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              cd terraform
              terraform init
              terraform apply -var-file="../environments/dev.tfvars" -auto-approve
            displayName: 'Terraform Apply'
            env:
              ARM_CLIENT_ID: $(ARM_CLIENT_ID)
              ARM_CLIENT_SECRET: $(ARM_CLIENT_SECRET)
              ARM_SUBSCRIPTION_ID: $(ARM_SUBSCRIPTION_ID)
              ARM_TENANT_ID: $(ARM_TENANT_ID)

          # check my infra is created correctly
          - script: python scripts/validate_infra.py --env dev
            displayName: 'Validate Infrastructure'
